name: main

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"

jobs:
  generated-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
      - name: go generate
        shell: bash
        run: go generate ./...
      - uses: a-novel-kit/workflows/generic-actions/check-changes@v1.24.1
        with:
          fail_message: go generate definitions are not up-to-date, please run 'go generate ./...' and commit the changes

  generated-pnpm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: a-novel-kit/workflows/generic-actions/pull-bot@v1.24.1
        id: app_token
        with:
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
      - uses: actions/setup-node@v7
        with:
          node-version: latest
      - name: install pnpm
        shell: bash
        run: npm install -g pnpm
      - name: setup github registry
        shell: bash
        run: |
          pnpm config set "@a-novel:registry" "https://npm.pkg.github.com"
          pnpm config set "@a-novel-kit:registry" "https://npm.pkg.github.com"
          pnpm config set "//npm.pkg.github.com/:_authToken" "${{ secrets.GITHUB_TOKEN }}"
      - name: install dependencies
        shell: bash
        run: pnpm i --frozen-lockfile
      - name: pnpm
        shell: bash
        run: pnpm generate
      - uses: a-novel-kit/workflows/generic-actions/check-changes@v1.24.1
        with:
          fail_message: pnpm definitions are not up-to-date, please run 'pnpm generate' and commit the changes

  lint-go:
    runs-on: ubuntu-latest
    needs: [generated-go]
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/go-actions/lint-go@v1.24.1

  lint-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: a-novel-kit/workflows/node-actions/lint-node@v1.24.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}
          lint_action: "lint:ci"

  test-go:
    needs: [lint-go, build-database]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.test.outputs.artifact-id }}
    services:
      postgres:
        image: ghcr.io/a-novel/service-authentication/database@${{ needs.build-database.outputs.digest }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      PLATFORM_AUTH_URL: http://localhost:7010
      SUPER_ADMIN_EMAIL: noreply@agorastoryverse.com
      SUPER_ADMIN_PASSWORD: admin
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/run-migrations
      # CI built the init job and never ran it, so nothing exercised its wiring:
      # the config it loads, the database context it seeds, the services it
      # assembles. Unit tests cover the logic; only the binary covers the binary.
      #
      # Twice on purpose. The job ensures a super-admin exists, so it is safe to
      # re-run, and the second run is what catches it tripping over the row the
      # first one wrote.
      - name: Run the init job
        shell: bash
        run: |
          go run ./cmd/init
          go run ./cmd/init
      - uses: a-novel-kit/workflows/go-actions/test-go@v1.24.1
        id: test
        with:
          filter_extra_patterns: "| grep /internal"
          skip_setup: true
          test_artifact: gotest
          coverage_artifact: gocover
          coverage_file: coverage.txt
          modfile: gotestsum.mod

  # pkg/go is the published Go client: the auth middleware wired against an injected claims
  # verifier, and the role-inheritance resolution NewAuthHandler runs at startup. It has no
  # network client and touches no database, so this lane stands up no services — unlike the
  # sibling services, whose pkg tests are gRPC clients. It runs in its own lane because
  # test-go filters to /internal, which leaves /pkg uncovered.
  test-pkg:
    runs-on: ubuntu-latest
    needs: [lint-go]
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.test.outputs.artifact-id }}
    steps:
      - uses: a-novel-kit/workflows/go-actions/test-go@v1.24.1
        id: test
        with:
          filter_extra_patterns: "| grep /pkg"
          test_artifact: gotestpkg
          coverage_artifact: gocoverpkg
          coverage_file: coverage_pkg.txt
          modfile: gotestsum.mod

  test-pkg-js:
    runs-on: ubuntu-latest
    needs: [build-database, build-standalone-rest]
    permissions:
      contents: read
      packages: read
    outputs:
      artifact-id: ${{ steps.test.outputs.artifact-id }}
    services:
      mailserver:
        image: ghcr.io/axllent/mailpit:v1.30.5
        ports:
          - "8025:8025"
        env:
          MP_MAX_MESSAGES: 5000
          MP_SEND_API_AUTH_ACCEPT_ANY: true
          MP_SMTP_AUTH_ACCEPT_ANY: true
          MP_SMTP_AUTH_ALLOW_INSECURE: true
          MP_SENDMAIL_FROM: noreply@agorastoryverse.com
          MP_DISABLE_WAL: true

      postgres-json-keys:
        image: ghcr.io/a-novel/service-json-keys/database:v2.4.1
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-authentication:
        image: ghcr.io/a-novel/service-authentication/database@${{ needs.build-database.outputs.digest }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      service-json-keys:
        image: ghcr.io/a-novel/service-json-keys/standalone-grpc:v2.4.1
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_DSN: postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable
          APP_MASTER_KEY: "fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca"

      service-authentication:
        image: ghcr.io/a-novel/service-authentication/standalone-rest@${{ needs.build-standalone-rest.outputs.digest }}
        ports:
          - "4000:8080"
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_DSN: postgres://postgres:postgres@postgres-authentication:5432/postgres?sslmode=disable
          SERVICE_JSON_KEYS_PORT: 8080
          SERVICE_JSON_KEYS_HOST: service-json-keys
          SUPER_ADMIN_EMAIL: noreply@agorastoryverse.com
          SUPER_ADMIN_PASSWORD: admin
          PLATFORM_AUTH_URL: "http://auth-platform"
          SMTP_SENDER_DOMAIN: mailserver
          SMTP_ADDR: mailserver:1025
          SMTP_SENDER_NAME: Agora Storyverse [noreply]
          SMTP_SENDER_EMAIL: noreply@agorastoryverse.com
          SMTP_SENDER_PASSWORD: noreply
          SMTP_FORCE_UNENCRYPTED: true
    env:
      REST_URL: http://0.0.0.0:4000
      SUPER_ADMIN_EMAIL: noreply@agorastoryverse.com
      SUPER_ADMIN_PASSWORD: admin
      MAIL_HOST: http://0.0.0.0:8025
    steps:
      - uses: a-novel-kit/workflows/node-actions/test-node@v1.24.1
        id: test
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}
          coverage_artifact: jscover
          test_action: "test:ci"

  build-database:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    steps:
      - uses: a-novel-kit/workflows/build-actions/docker@v1.24.1
        id: build
        with:
          file: builds/database.Dockerfile
          image_name: ${{ github.repository }}/database
          cache: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_args: >-
            -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" 
            -e POSTGRES_USER="${POSTGRES_USER}" 
            -e POSTGRES_DB="${POSTGRES_DB}"
            -e POSTGRES_HOST_AUTH_METHOD="${POSTGRES_HOST_AUTH_METHOD}"
            -e POSTGRES_INITDB_ARGS="${POSTGRES_INITDB_ARGS}"

  build-migrations:
    runs-on: ubuntu-latest
    needs: [build-database]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    services:
      postgres-authentication:
        image: ghcr.io/a-novel/service-authentication/database@${{ needs.build-database.outputs.digest }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: a-novel-kit/workflows/build-actions/docker-job@v1.24.1
        with:
          file: builds/migrations.Dockerfile
          image_name: ${{ github.repository }}/jobs/migrations
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_args: -e POSTGRES_DSN="${POSTGRES_DSN}"

  build-init:
    runs-on: ubuntu-latest
    needs: [test-go, build-database]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    services:
      postgres-authentication:
        image: ghcr.io/a-novel/service-authentication/database@${{ needs.build-database.outputs.digest }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      SUPER_ADMIN_EMAIL: noreply@agorastoryverse.com
      SUPER_ADMIN_PASSWORD: admin
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/run-migrations
      - uses: a-novel-kit/workflows/build-actions/docker-job@v1.24.1
        with:
          file: builds/init.Dockerfile
          image_name: ${{ github.repository }}/jobs/init
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_args: >-
            -e POSTGRES_DSN="${POSTGRES_DSN}"
            -e SUPER_ADMIN_EMAIL="${SUPER_ADMIN_EMAIL}"
            -e SUPER_ADMIN_PASSWORD="${SUPER_ADMIN_PASSWORD}"

  build-rest:
    needs: [test-go, build-database]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    services:
      postgres-json-keys:
        image: ghcr.io/a-novel/service-json-keys/database:v2.4.1
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-authentication:
        image: ghcr.io/a-novel/service-authentication/database@${{ needs.build-database.outputs.digest }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth=scram-sha-256

      service-json-keys:
        image: ghcr.io/a-novel/service-json-keys/standalone-grpc:v2.4.1
        ports:
          - "4000:8080"
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_DSN: postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable
          APP_MASTER_KEY: "fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca"
    env:
      POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      SERVICE_JSON_KEYS_PORT: 4000
      SERVICE_JSON_KEYS_HOST: 0.0.0.0
      PLATFORM_AUTH_URL: http://localhost:6000
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/run-migrations
      - uses: a-novel-kit/workflows/build-actions/docker@v1.24.1
        with:
          file: builds/rest.Dockerfile
          image_name: ${{ github.repository }}/rest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_args: >-
            -e POSTGRES_DSN="${POSTGRES_DSN}"
            -e SERVICE_JSON_KEYS_PORT="${SERVICE_JSON_KEYS_PORT}"
            -e SERVICE_JSON_KEYS_HOST="${SERVICE_JSON_KEYS_HOST}"
            -e PLATFORM_AUTH_URL="${PLATFORM_AUTH_URL}"

  build-standalone-rest:
    needs: [test-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    # This image is booted and exercised by test-pkg-js (a full
    # integration run), so this job only builds + pushes it. skip_healthcheck
    # drops the redundant smoke run and the container constellation it needed.
    steps:
      - uses: a-novel-kit/workflows/build-actions/docker@v1.24.1
        id: build
        with:
          file: builds/standalone.rest.Dockerfile
          image_name: ${{ github.repository }}/standalone-rest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_healthcheck: true

  build-js:
    needs: [test-pkg-js]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: a-novel-kit/workflows/node-actions/build-node@v1.24.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}
          build_action: "build:rest"

  report-codecov:
    runs-on: ubuntu-latest
    needs: [test-go, test-pkg, test-pkg-js]
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/generic-actions/codecov@v1.24.1
        with:
          codecov_token: ${{ secrets.CODECOV_TOKEN }}
          coverage_files: coverage.txt,coverage_pkg.txt,coverage/*
          coverage_artifact_ids: ${{ needs.test-go.outputs.artifact-id }},${{ needs.test-pkg.outputs.artifact-id }},${{ needs.test-pkg-js.outputs.artifact-id }}

  publish-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && success()
    needs: [build-js]
    # GitHub Pages allows a single deployment in flight per site; without this
    # group, concurrent master runs fail with "in progress deployment" errors.
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - run: |
          mkdir _site
          mv openapi.html _site/index.html
          mv openapi.yaml _site/openapi.yaml
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
      - id: deployment
        uses: actions/deploy-pages@v5
