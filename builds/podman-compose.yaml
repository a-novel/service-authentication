services:
  # ====================================================================================================================
  # EXT. DEPENDENCIES
  # ====================================================================================================================

  mailserver:
    image: ghcr.io/axllent/mailpit:v1.30.0
    ports:
      # Two host-port publishes: the SMTP listener (1025) is what go-exec
      # service-authentication-rest talks to, the UI listener (8025) is
      # what the operator opens in a browser. Without the SMTP publish the
      # rest binary running on the host can't reach the mailpit container's
      # internal port, and /healthcheck reports "client:smtp down".
      - "${SMTP_PORT}:1025"
      - "${MAIL_UI_PORT}:8025"
    networks:
      - api
    restart: unless-stopped
    volumes:
      - mailserver-data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SEND_API_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true
      MP_SENDMAIL_FROM: noreply@agorastoryverse.com
      MP_DISABLE_WAL: true
      MP_VERBOSE: true

  # ====================================================================================================================
  # DATABASE
  # ====================================================================================================================

  # NOTE: postgres-json-keys (sibling service's database) is NOT declared
  # here. The new `a-novel run` model treats service-json-keys as a separate
  # service whose own daemon-managed lifecycle the user/agent owns; this
  # production compose only describes its OWN infra. The test compose
  # variants (podman-compose.go.test.yaml etc.) keep an isolated placeholder
  # so each test run has fully-isolated infra.

  postgres-authentication:
    build:
      context: ..
      dockerfile: ./builds/database.Dockerfile
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - api
    environment:
      # Spec §12.1: inline test-default credentials. Daemon owns dynamic
      # env (ports, derived URLs, cross-service refs) but NOT constants.
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - authentication-postgres-data:/var/lib/postgresql/

  # ====================================================================================================================
  # ONE-SHOT TARGETS
  # ====================================================================================================================
  # The a-novel daemon runs these on infra-up (`a-novel run service infra
  # start`, or implicitly when a target that depends on them starts); they
  # exit when done. Profiled out of a plain `podman compose up` on purpose —
  # the daemon orchestrates them via `depends_on`, not Compose's profile
  # cascade.

  # init: provisions initial seed data / configuration. Runs first
  # (depends_on postgres only).
  service-authentication-init:
    profiles: ["init"]
    build:
      context: ..
      dockerfile: ./builds/init.Dockerfile
    depends_on:
      postgres-authentication:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-authentication:5432/postgres?sslmode=disable"
    networks:
      - api

  # migrations: applies the schema. Depends on init (some migrations may
  # rely on init-provisioned rows).
  service-authentication-migrations:
    profiles: ["migrations"]
    build:
      context: ..
      dockerfile: ./builds/migrations.Dockerfile
    depends_on:
      postgres-authentication:
        condition: service_healthy
      service-authentication-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-authentication:5432/postgres?sslmode=disable"
    networks:
      - api

  # ====================================================================================================================
  # LONG-RUNNER TARGETS
  # ====================================================================================================================

  # NOTE: service-json-keys placeholder removed — see DATABASE note above.
  # The daemon resolves cross-service references via the spec §6.4
  # env-wiring convention: `${SERVICE_JSON_KEYS_GRPC_PORT}` allocates
  # against service-json-keys' grpc long-runner and `_GRPC_HOST` derives
  # to `localhost`. The KEY the daemon allocates is
  # SERVICE_JSON_KEYS_GRPC_PORT (the `_GRPC_` segment names which target
  # of service-json-keys), and the VALUE service-authentication's Go
  # code reads is SERVICE_JSON_KEYS_HOST / SERVICE_JSON_KEYS_PORT. The
  # adapter is the env block below: each Go-facing var is assigned to
  # the daemon-facing `${...}` reference so the Go code keeps reading
  # its existing names while the daemon owns the values.

  # Profiled so a plain `podman compose up` does NOT start it: `a-novel run`
  # brings this file up only for the local infra (postgres-authentication,
  # mailserver) and runs THIS service locally (go run). A containerised copy
  # on the same host ${REST_PORT} would collide ("bind: address already in
  # use"). `--profile rest` opts into the dockerised copy instead.
  service-authentication-rest:
    profiles: ["rest"]
    build:
      context: ..
      dockerfile: ./builds/standalone.rest.Dockerfile
    ports:
      - "${REST_PORT}:8080"
    depends_on:
      postgres-authentication:
        condition: service_healthy
      mailserver:
        condition: service_started
      service-authentication-init:
        condition: service_completed_successfully
      service-authentication-migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-authentication:5432/postgres?sslmode=disable"
      # Cross-service adapter: Go code reads SERVICE_JSON_KEYS_HOST /
      # SERVICE_JSON_KEYS_PORT; the daemon allocates against
      # SERVICE_JSON_KEYS_GRPC_PORT and derives SERVICE_JSON_KEYS_GRPC_HOST.
      # The ${...} substitution bridges the two.
      SERVICE_JSON_KEYS_HOST: "${SERVICE_JSON_KEYS_GRPC_HOST}"
      SERVICE_JSON_KEYS_PORT: "${SERVICE_JSON_KEYS_GRPC_PORT}"
      # Operator-supplied (intentional ${VAR} — these vary per local
      # operator and are not daemon-managed).
      SUPER_ADMIN_EMAIL: "${SUPER_ADMIN_EMAIL}"
      SUPER_ADMIN_PASSWORD: "${SUPER_ADMIN_PASSWORD}"
      PLATFORM_AUTH_URL: "${PLATFORM_AUTH_URL}"
      # SMTP: mailserver publishes ${SMTP_PORT}:1025 above, so
      # ${SMTP_HOST}=localhost and ${SMTP_PORT}=<allocated> in go-exec
      # mode. SMTP_SENDER_DOMAIN must match the host portion of
      # SMTP_ADDR (Go's net/smtp PlainAuth.Start rejects the auth when
      # the AUTH `host` arg differs from the connection's serverName —
      # a MITM-prevention check). Bind to ${SMTP_HOST} so it tracks
      # SMTP_ADDR through any network-plane change.
      SMTP_SENDER_DOMAIN: "${SMTP_HOST}"
      SMTP_ADDR: "${SMTP_HOST}:${SMTP_PORT}"
      SMTP_SENDER_NAME: Agora Storyverse [noreply]
      SMTP_SENDER_EMAIL: noreply@agorastoryverse.com
      SMTP_SENDER_PASSWORD: noreply
      SMTP_FORCE_UNENCRYPTED: true
      TERM: xterm-color
    networks:
      - api

networks:
  api:

volumes:
  authentication-postgres-data:
  mailserver-data:
